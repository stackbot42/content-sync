name: sync

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pipeline
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PIPELINE_TOKEN }}" \
            https://api.github.com/repos/${{ secrets.PIPELINE_OWNER }}/content-pipeline/actions/workflows/run.yml/dispatches \
            -d '{"ref":"main"}'
